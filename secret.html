<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./secret.css"/>
<title>Secret Chats 💬</title>

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Chat Box */
.chat-box {
    width: 350px;
    height: 600px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Header */
.chat-header {
    background: #ff477e;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
}

/* Chat area */
.chat-container {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* Messages */
.msg {
    padding: 10px 15px;
    border-radius: 20px;
    max-width: 70%;
    font-size: 14px;
}

/* Left (her) */
.left {
    background: #ffe5ec;
    align-self: flex-start;
}

/* Right (you) */
.right {
    background: #ff477e;
    color: white;
    align-self: flex-end;
}

/* Input area */
.chat-input {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
    background: #f1f1f1;
}

.chat-input button {
    background: #ff477e;
    color: white;
    border: none;
    margin-left: 10px;
    padding: 10px 15px;
    border-radius: 50%;
    cursor: pointer;
}

/* Back button */
.back-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<i class="fa-solid fa-arrow-left back-btn" onclick="goBack()"></i>

<div class="chat-box">
    <div class="chat-header">
        Secret Chats 💬❤️
    </div>

    <div class="chat-container" id="chat">
        <div class="msg left">Hey ❤️</div>
        <div class="msg right">Hi jaan 😘</div>
        <div class="msg left">Miss you 🥺</div>
        <div class="msg right">I love you 💕</div>
        <div class="msg left">Forever? 💖</div>
        <div class="msg right">Always ❤️</div>
    </div>
    <h3 class="see">See Here⬇️</h3>
    <button class="secret-btn"><a href="secret.html" class="link">See our Secret Chats🔐</a></button>
    <button class="go"><a href="index.html" class="link">Go Back⬅️</a></button>

    <div class="chat-input">
        <input type="text" id="msgInput" placeholder="Type a message...">
        <button onclick="sendMsg()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
</div>

<script>
function sendMsg() {
    let input = document.getElementById("msgInput");
    let chat = document.getElementById("chat");

    if(input.value.trim() === "") return;

    let msg = document.createElement("div");
    msg.classList.add("msg", "right");
    msg.textContent = input.value;

    chat.appendChild(msg);
    input.value = "";

    chat.scrollTop = chat.scrollHeight;
}

function goBack() {
    window.history.back();
}
</script>

</body>
</html>
