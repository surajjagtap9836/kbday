<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Birthday Photo Template</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
        padding:30px;
    }

    .birthday-card{
        width:900px;
        background:white;
        border-radius:25px;
        padding:30px;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
        position:relative;
        overflow:hidden;
    }

    /* Decorative Border */
    .birthday-card::before{
        content:"";
        position:absolute;
        inset:0;
        padding:8px;
        border-radius:25px;
        background:linear-gradient(
            45deg,
            #ff0080,
            #ff8c00,
            #ffd700,
            #00c9ff,
            #7b2ff7
        );
        -webkit-mask:
            linear-gradient(#fff 0 0) content-box,
            linear-gradient(#fff 0 0);
        -webkit-mask-composite:xor;
        mask-composite:exclude;
        pointer-events:none;
    }

    h1{
        text-align:center;
        color:#ff1493;
        margin-bottom:25px;
        font-size:45px;
        font-family:cursive;
    }

    .photo-container{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
        gap:25px;
    }

    .photo-box{
        background:#fff0f6;
        padding:15px;
        border-radius:20px;
        text-align:center;
        transition:0.4s;
        border:3px dashed #ff69b4;
    }

    .photo-box:hover{
        transform:scale(1.05);
    }

    .photo-box img{
        width:100%;
        height:250px;
        object-fit:cover;
        border-radius:15px;
        border:5px solid white;
        box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    .caption{
        margin-top:12px;
        font-size:20px;
        color:#d63384;
        font-weight:bold;
    }

    .hearts{
        position:absolute;
        top:10px;
        right:20px;
        font-size:35px;
        animation:float 2s infinite alternate;
    }

    @keyframes float{
        from{
            transform:translateY(0);
        }
        to{
            transform:translateY(10px);
        }
    }

</style>
</head>

<body>

<div class="birthday-card">

    <div class="hearts">🎂💖✨</div>

    <h1>Happy Birthday ❤️</h1>

    <div class="photo-container">

        <div class="photo-box">
            <img src="./k1.png" alt="">
            <div class="caption">Beautiful Memories</div>
        </div>

        <div class="photo-box">
            <img src="https://picsum.photos/300/400?random=2" alt="">
            <div class="caption">Special Moments</div>
        </div>

        <div class="photo-box">
            <img src="https://picsum.photos/300/400?random=3" alt="">
            <div class="caption">Forever Together</div>
        </div>

    </div>

</div>

</body>
</html>
